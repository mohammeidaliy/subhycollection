    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
        <title>Subhy Collection — Curated Living</title>
        <meta name="description" content="Discover curated products for modern living. Premium quality, timeless design.">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="styles.css">
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    </head>
    <body>
        <!-- Navbar -->
        <nav class="navbar" id="navbar">
            <div class="nav-container">
                <a href="/" class="logo" onclick="navigate('/'); return false;">
                    <span class="logo-mark">s</span>
                    <span class="logo-text">Subhy Collection</span>
                </a>
                
                <div class="nav-center">
                    <a href="/" class="nav-link" onclick="navigate('/'); return false;" data-i18n="home">Home</a>
                    <a href="/products" class="nav-link" onclick="navigate('/products'); return false;" data-i18n="products">Shop</a>
                    <a href="/categories" class="nav-link" onclick="navigate('/categories'); return false;" data-i18n="categories">Categories</a>
                </div>
                
                <div class="nav-right">
                    <button class="icon-btn" id="search-toggle" aria-label="Search">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                    </button>
                    <button class="icon-btn" id="lang-btn" onclick="toggleLang()" aria-label="Language">EN</button>
                    <button class="icon-btn" id="curr-btn" onclick="toggleCurrency()" aria-label="Currency">$</button>
                    <button class="icon-btn" id="theme-btn" onclick="toggleTheme()" aria-label="Theme">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    </button>
                    <a href="/admin.html" class="icon-btn" aria-label="Admin">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    </a>
                    <button class="hamburger" id="hamburger" aria-label="Menu" onclick="toggleMobileMenu()">
                        <span></span><span></span><span></span>
                    </button>
                </div>
            </div>
            
            <!-- Search Overlay -->
            <div class="search-overlay" id="search-overlay">
                <div class="search-inner">
                    <input type="text" id="search-input" placeholder="Search products, brands, categories..." data-i18n-placeholder="search">
                    <button class="search-close" onclick="closeSearch()">✕</button>
                </div>
            </div>
        </nav>
        
        <!-- Mobile Menu -->
        <div class="mobile-menu" id="mobile-menu">
            <div class="mobile-menu-header">
                <span class="logo-text">Subhy Collection</span>
                <button class="mobile-close" onclick="toggleMobileMenu()">✕</button>
            </div>
            <div class="mobile-menu-links">
                <a href="/" onclick="navigate('/'); toggleMobileMenu(); return false;" data-i18n="home">Home</a>
                <a href="/products" onclick="navigate('/products'); toggleMobileMenu(); return false;" data-i18n="products">Shop</a>
                <a href="/categories" onclick="navigate('/categories'); toggleMobileMenu(); return false;" data-i18n="categories">Categories</a>
            </div>
            <div class="mobile-menu-footer">
                <button onclick="toggleLang(); toggleMobileMenu();" id="mobile-lang">English / Swahili</button>
                <button onclick="toggleCurrency(); toggleMobileMenu();" id="mobile-curr">USD / TZS</button>
                <button onclick="toggleTheme(); toggleMobileMenu();" id="mobile-theme">Light / Dark</button>
            </div>
        </div>
        <div class="mobile-backdrop" id="mobile-backdrop" onclick="toggleMobileMenu()"></div>
        
        <!-- Main Content -->
        <main id="app"></main>
        
        <!-- Footer -->
        <footer class="footer" id="footer">
            <div class="footer-inner">
                <div class="footer-brand">
                    <span class="logo-mark">S</span>
                    <span class="logo-text">Subhy Collection</span>
                    <p id="footer-text">Curated products for modern living. Quality meets timeless design.</p>
                </div>
                <div class="footer-links">
                    <div class="footer-col">
                        <h4>Shop</h4>
                        <a href="/products" onclick="navigate('/products'); return false;">All Products</a>
                        <a href="/categories" onclick="navigate('/categories'); return false;">Categories</a>
                        <a href="/products?featured=true" onclick="navigate('/products?featured=true'); return false;">Featured</a>
                    </div>
                    <div class="footer-col">
                        <h4>Support</h4>
                        <a href="#" onclick="openWhatsApp(); return false;">Contact Us</a>
                        <a href="#" onclick="openWhatsApp(); return false;">Order via WhatsApp</a>
                    </div>
                </div>
            </div>
            <div class="footer-bottom">
                <p>© 2026 Subhy Collection. All rights reserved.</p>
            </div>
        </footer>
        
        <!-- WhatsApp Float -->
        <a href="https://wa.me/" class="whatsapp-float" id="whatsapp-float" target="_blank" rel="noopener">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        </a>
        
        <script src="utils.js"></script>
        <script src="app.js"></script>
        <script>
            function toggleLang() {
                const newLang = currentLang === 'en' ? 'sw' : 'en';
                setLang(newLang);
                document.getElementById('lang-btn').textContent = newLang.toUpperCase();
                router();
            }
            function toggleCurrency() {
                const newCurr = currentCurrency === 'USD' ? 'TZS' : 'USD';
                setCurrency(newCurr);
                document.getElementById('curr-btn').textContent = newCurr === 'USD' ? '$' : 'TSh';
            }
            function toggleTheme() {
                const newTheme = currentTheme === 'light' ? 'dark' : 'light';
                setTheme(newTheme);
            }
            function toggleMobileMenu() {
                document.getElementById('mobile-menu').classList.toggle('open');
                document.getElementById('mobile-backdrop').classList.toggle('open');
                document.body.classList.toggle('menu-open');
            }
            function openSearch() {
                document.getElementById('search-overlay').classList.add('open');
                document.getElementById('search-input').focus();
                document.body.style.overflow = 'hidden';
            }
            function closeSearch() {
                document.getElementById('search-overlay').classList.remove('open');
                document.body.style.overflow = '';
            }
            function openWhatsApp() {
                const num = settings.whatsapp_number || '';
                window.open(`https://wa.me/${num}`, '_blank');
            }
            
            document.getElementById('search-toggle').addEventListener('click', openSearch);
            document.getElementById('search-input').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') { closeSearch(); handleSearch(e.target.value); }
            });
            
            document.getElementById('lang-btn').textContent = currentLang.toUpperCase();
            document.getElementById('curr-btn').textContent = currentCurrency === 'USD' ? '$' : 'TSh';
        </script>
    </body>
    </html>
